name: Playwright Visual Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      snapshots_changed: ${{ steps.detect_changes.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run Playwright tests
        run: bunx playwright test --update-snapshots
        env:
          CI: true

      - name: Detect snapshot updates
        id: detect_changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Playwright update-snapshots modified files."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes after update-snapshots."
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 14

  require-approval-if-snapshots-changed:
    needs: visual-check
    if: needs.visual-check.outputs.snapshots_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: playwright-snapshot-approval
    steps:
      - name: Approved snapshot updates
        run: echo "Snapshot updates approved."
