name: Update Playwright Snapshots

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why this visual update is expected
        required: false
        type: string
      test_path:
        description: "Optional Playwright test path or grep filter (example: e2e/portfolio.spec.ts)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Update Playwright snapshots
        env:
          CI: true
          TEST_PATH: ${{ inputs.test_path }}
        run: |
          if [ -n "$TEST_PATH" ]; then
            bunx playwright test "$TEST_PATH" --update-snapshots
          else
            bunx playwright test --update-snapshots
          fi

      - name: Stage snapshot changes
        run: |
          git add -A
          git restore --staged playwright-report test-results || true

      - name: Create PR with snapshot updates
        env:
          REASON: ${{ inputs.reason }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.ref_name }}
          branch: chore/playwright-snapshots-${{ github.run_id }}
          title: "chore: update Playwright snapshots"
          commit-message: "chore: update Playwright snapshots"
          body: |
            Automated Playwright snapshot baseline update.

            Reason: ${{ env.REASON || 'not provided' }}
            Triggered by: @${{ github.actor }}
            Source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          add-paths: |
            e2e/**/*-snapshots/**
            e2e/**/*.snap
